<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThumbForge Studio - Ultra Thumbnails</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        .marquee-wrapper {
            background: linear-gradient(90deg, #ff4500, #ff6a00);
            color: #000000;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 15px 0;
            text-transform: uppercase;
            overflow: hidden;
            display: flex;
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(255, 73, 0, 0.4);
        }

        .marquee-content {
            display: inline-flex;
            animation: marquee 20s linear infinite;
        }

        .marquee-content span {
            padding: 0 30px;
            display: flex;
            align-items: center;
        }

        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }

        .header-nav {
            max-width: 1200px;
            margin: 30px auto;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: #ff5500;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            color: #000;
        }

        .logo-text h3 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-size: 10px;
            color: #ff5500;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: block;
        }

        .nav-links a {
            color: #aaaaaa;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ff5500;
            border-bottom: 2px solid #ff5500;
            padding-bottom: 5px;
        }

        .hero-container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .hero-text h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 75px;
            font-weight: 900;
            line-height: 0.95;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .hero-text h1 .outline {
            color: transparent;
            -webkit-text-stroke: 2px #ff5500;
            text-stroke: 2px #ff5500;
            paint-order: stroke fill;
        }

        .hero-text p {
            color: #888888;
            font-size: 16px;
            margin-top: 30px;
        }

        .stats-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: #141414;
            border: 1px solid #222;
            padding: 25px;
            border-radius: 16px;
            flex: 1;
            text-align: left;
        }

        .stat-box h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 36px;
            color: #ff5500;
            margin: 0;
        }

        .stat-box p {
            margin: 5px 0 0 0;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cta-btn {
            background: #ff5500;
            color: #ffffff;
            display: block;
            text-align: center;
            padding: 20px;
            border-radius: 14px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(255, 85, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 85, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="marquee-wrapper">
        <div class="marquee-content">
            <span>• DENJI STORE</span>
            <span>• DENJI STORE</span>
            <span>• DENJI STORE</span>
            <span>• DENJI STORE</span>
            <span>• DENJI STORE</span>
            <span>• DENJI STORE</span>
            <span>• DENJI STORE</span>
            <span>• DENJI STORE</span>
        </div>
    </div>

    <nav class="header-nav">
        <div class="logo-area">
            <div class="logo-icon">⚒</div>
            <div class="logo-text">
                <h3>ThumbForge</h3>
                <span>Studio</span>
            </div>
        </div>
        <div class="nav-links">
            <a href="#">Work</a>
            <a href="#">Reviews</a>
            <a href="#" class="active">Contact</a>
        </div>
    </nav>

    <main class="hero-container">
        <div class="hero-text">
            <h1>WE FORGE<br><span class="outline">THE ULTRA</span><br>THUMBNAILS.</h1>
            <p>We simply just make the force-clicks thumbnails!</p>
        </div>
        
        <div class="hero-right">
            <div class="stats-grid">
                <div class="stat-box">
                    <h2>14M+</h2>
                    <p>Views</p>
                </div>
                <div class="stat-box">
                    <h2>200K+</h2>
                    <p>Likes</p>
                </div>
            </div>
            <a href="#" class="cta-btn">LET'S TALK NOW!</a>
        </div>
    </main>

</body>
</html>
